services:
  postgres:
    image: postgres:16-alpine
    container_name: wo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wo}
      POSTGRES_USER: ${POSTGRES_USER:-wo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wo_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wo_user} -d ${POSTGRES_DB:-wo}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

