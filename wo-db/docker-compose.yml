services:
  postgres:
    image: postgres:16-alpine
    container_name: wo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PORT: 5432
      POSTGRES_DB: wo
      POSTGRES_USER: wo_user
      POSTGRES_PASSWORD: wo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
