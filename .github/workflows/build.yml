name: Build
on:
  push:
    branches: [main]
  pull_request:

jobs:
    api:
      name: API
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: wo-api

      steps:
        - name: Checkout code
          uses: actions/checkout@v3
          with:
            fetch-depth: 0

        - name: Set up Task
          uses: go-task/setup-task@v1

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4

        - name: Build the project
          run: task docker:build
